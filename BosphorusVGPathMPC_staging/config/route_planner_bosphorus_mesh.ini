; Istanbul Bogazi odakli mesh profili

[dataset]
land_geojson = dataset/bosphorus/polygon/land_polygon.geojson

[mesh]
land_geojson = dataset/bosphorus/mesh/land_mesh.geojson
grid_step_deg = 0.001
narrow_refine_step_deg = 0.0005
use_coastline_vertices = true
coastline_vertex_spacing_m = 250
min_lat = 40.85
max_lat = 41.35
min_lon = 28.80
max_lon = 29.35

[tss]
geojson = dataset/osm_tss_istanbul_genoa.geojson

[bathymetry]
geojson = dataset/osm_bathymetry_istanbul_genoa.geojson

[safety]
coastline_clearance_m = 0
min_depth_m = 8

[traffic]
enable_tss_routing = true
hard_tss_corridor = true
directional_lane_selection = true
lane_preference_multiplier = 0.82
off_lane_multiplier = 1.30
separation_zone_penalty_km = 8.0
boundary_crossing_penalty_km = 3.0
lane_corridor_half_width_km = 1.0
lane_endpoint_radius_km = 3.0
starboard_boundary_bias = 0.20

[route]
start_name = Bosphorus-N
start_lat = 41.235000
start_lon = 29.128000
goal_name = Bosphorus-S
goal_lat = 40.965000
goal_lon = 28.995000

[cache]
use_cache = true
use_cache_file = cache/triangulation_bosphorus_mesh.bin
build_cache_file = cache/triangulation_bosphorus_mesh.bin

[output]
svg_file = output/bosphorus_mesh.svg
