# RotaOptimaldsCpp obstacle-avoidance scenario
# waypoint format:
# waypoint = X,Y,psig,Kf,tol,use_Kf,w_wp,hit_scale
# obstacle format:
# obstacle = cx,cy,radius[,enabled]

N_MPC = 15

ds_min = 0.01
ds_max = 3
K_max = 0.3
S_max = 18
nseg = 4

w_pos = 50.0
w_psi = 15.0
w_K = .5
w_Kcmd = 0.25
w_dKcmd = 80.0
w_ds_smooth = 0.1
ds_jump_max = 0.0
w_Kf = 150.0

w_prog = 0.0
alpha_prog = 0.0
hit_ratio = 0.7

block_lengths_Kcmd = 1,1,2,2,2,2,2,2,1
block_lengths_ds   = 1,1,2,2,2,2,2,2,1

x0 = 0.0
y0 = 0.0
psi0 = 0.0
K0 = 0.0

tol_default = 1.2
max_iters = 260
use_heading_gate = false
tol_psi_deg = 15.0
w_wp_intermediate = 5.0
term_scale_intermediate = 0.35
term_scale_final = .20
hit_scale_intermediate = 0.7
w_wp_final = 1.0
use_wp_kf = true
kf_fallback = 0.0

enable_obstacle_avoidance = true
obstacle_clearance = 1.5
obstacle_trigger_margin = 1.0
obstacle_waypoint_tol = 1.2

# Main route (single target for clearer obstacle bypass)
waypoint = 91.0, 80.0, 0, 0, 1.0, false,,

# Obstacle on direct path
obstacle = 40.0, 25.0, 10
