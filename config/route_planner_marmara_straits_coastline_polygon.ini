; Marmara + Bogazlar triangulation profili
; Buffered mesh dataset kullanmadan, dogrudan coastline polygon vertex'lerini triangulation seed'i yapar.

[dataset]
land_geojson = dataset/osm_land_istanbul_genoa.geojson

[tss]
geojson = dataset/osm_tss_istanbul_genoa.geojson

[bathymetry]
geojson = dataset/osm_bathymetry_istanbul_genoa.geojson

[mesh]
grid_step_deg = 0.01
use_coastline_vertices = true
coastline_vertex_spacing_m = 1000
; Sabit mesh siniri
min_lat = 34.00
max_lat = 51.00
min_lon = 0.00
max_lon = 35.00

[safety]
coastline_clearance_m = 0
min_depth_m = 8

[route]
start_name = Marmara-NE
start_lat = 41.265054
start_lon = 29.176897
goal_name = Marmara-SW
goal_lat = 40.955769
goal_lon = 28.975018

[cache]
use_cache = false
build_cache_file = cache/triangulation_coastline_polygon.bin

[output]
svg_file = output/marmara_straits_coastline_polygon.svg
