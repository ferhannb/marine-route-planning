; Route planner scenario: Izmir -> Venedik using generic Istanbul-Genoa mesh cache

[dataset]
land_geojson = dataset/ne_10m_land.geojson

[mesh]
grid_step_deg = 0.10
corridor_lat_pad_deg = 6.0
corridor_lon_pad_deg = 8.0

[safety]
coastline_clearance_m = 100

[route]
start_name = Izmir
start_lat = 36.792377
start_lon = 30.834290
goal_name = Venedik
goal_lat = 44.407357
goal_lon = 8.917501


[cache]
use_cache = true
use_cache_file = cache/route_planner_generic_istanbul_genoa_10m_g02_c100.bin

[output]
svg_file = output/izmir_venedik_from_generic_cache.svg
