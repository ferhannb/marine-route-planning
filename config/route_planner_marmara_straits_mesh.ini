; Marmara + Bogazlar (Karadeniz ve Ege cikislari dahil) mesh profili

[dataset]
land_geojson = dataset/osm_land_istanbul_genoa.geojson

[tss]
geojson = dataset/osm_tss_istanbul_genoa.geojson

[bathymetry]
geojson = dataset/osm_bathymetry_istanbul_genoa.geojson

[mesh]
grid_step_deg = 0.01
narrow_refine_step_deg = 0.0025
use_coastline_vertices = true
coastline_vertex_spacing_m = 1000
; Sabit mesh siniri: Marmara + Istanbul Bogazi kuzey cikisi + Canakkale Bogazi Ege cikisi
min_lat = 39.60
max_lat = 42.20
min_lon = 25.00
max_lon = 30.60

[safety]
coastline_clearance_m = 50
min_depth_m = 8

[route]
start_name = Marmara-NE
start_lat = 41.265054
start_lon = 29.176897
goal_name = Marmara-SW
goal_lat = 40.955769
goal_lon = 28.975018

[traffic]
enable_tss_routing = true
hard_tss_corridor = true
directional_lane_selection = true
lane_preference_multiplier = 0.82
off_lane_multiplier = 1.30
separation_zone_penalty_km = 8.0
boundary_crossing_penalty_km = 3.0
lane_corridor_half_width_km = 1.0
lane_endpoint_radius_km = 3.0
starboard_boundary_bias = 0.20




[cache]
use_cache = false
build_cache_file = cache/triangulationdataset_marmara_straits_bathy_g01_c050.bin

[output]
svg_file = output/marmara_straits_mesh.svg
