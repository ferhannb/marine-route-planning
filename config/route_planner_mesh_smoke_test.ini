; Small-bounds smoke test for embedded detailed-land planner cache

[dataset]
land_geojson = dataset/osm_land_istanbul_genoa.geojson

[mesh]
land_geojson = dataset/mesh/land_mesh.geojson
grid_step_deg = 0.02
use_coastline_vertices = true
coastline_vertex_spacing_m = 2500
min_lat = 40.80
max_lat = 41.35
min_lon = 28.85
max_lon = 29.25

[bathymetry]
geojson = dataset/osm_bathymetry_istanbul_genoa.geojson

[safety]
coastline_clearance_m = 0
min_depth_m = 8

[route]
start_name = Marmara-NE
start_lat = 41.265054
start_lon = 29.176897
goal_name = Marmara-SW
goal_lat = 40.955769
goal_lon = 28.975018

[cache]
use_cache = false
build_cache_file = /tmp/test_cache_v6.bin

[output]
svg_file = /tmp/test_cache_v6.svg
