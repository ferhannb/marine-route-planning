; Generic triangulation profile using the 200 m mesh-buffered coastline dataset.
; Edit the mesh min/max bounds and route start/goal coordinates as needed.

[dataset]
land_geojson = dataset/buffered/osm_land_istanbul_genoa_mesh_buffer_200m.geojson

[tss]
geojson = dataset/osm_tss_istanbul_genoa.geojson

[bathymetry]
geojson = dataset/osm_bathymetry_istanbul_genoa.geojson

[mesh]
grid_step_deg = 0.01
; Change these four values for your target area.
min_lat = 34.00
max_lat = 51.00
min_lon = 0.00
max_lon = 35.00

[safety]
; Buffered land dataset already includes the 200 m coast margin.
coastline_clearance_m = 0
min_depth_m = 8

[route]
start_name = Start
start_lat = 41.265054
start_lon = 29.176897
goal_name = Goal
goal_lat = 40.955769
goal_lon = 28.975018

[cache]
use_cache = false
build_cache_file = cache/triangulation_buffer200.bin

[output]
svg_file = output/triangulation_buffer200.svg
