; Route planner scenario: Izmir -> Venedik with detailed OSM land polygons

[dataset]
land_geojson = dataset/osm_land_istanbul_genoa.geojson

[tss]
geojson = dataset/osm_tss_istanbul_genoa.geojson

[bathymetry]
geojson = dataset/osm_bathymetry_istanbul_genoa.geojson

[mesh]
grid_step_deg = 0.20
corridor_lat_pad_deg = 6.0
corridor_lon_pad_deg = 8.0

[safety]
coastline_clearance_m = 100
; min_depth_m = 20

[route]
start_name = Athens
start_lat = 38.145168
start_lon = 22.7065
goal_name = Venedik
goal_lat = 36.9930
goal_lon = 28.0359

[cache]
use_cache = false
build_cache_file = cache/route_planner_osm_land_istanbul_genoa_bathy_g02_c100.bin

[output]
svg_file = output/izmir_venedik_osm_land.svg
